name: check-harness

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-check:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Validar núcleo portátil
        run: node scripts/sync-harness.mjs --check --source-mode
      - name: Validar wrapper PowerShell
        if: runner.os == 'Windows'
        run: pwsh scripts/sync-harness.ps1 -Check -SourceMode
      - name: Validar wrapper Bash
        if: runner.os != 'Windows'
        run: bash scripts/sync-harness.sh --check --source-mode

  contract-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Executar contratos do harness
        run: pwsh scripts/test-harness-contracts.ps1
